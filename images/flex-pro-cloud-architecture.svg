  <text x="160" y="432" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Cloud PBX · NUSO Rec.</text>
  <text x="160" y="446" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Per-user / month</text>

  <rect x="260" y="380" width="160" height="70" rx="6" fill="#162545" stroke="rgba(200,148,58,0.3)" stroke-width="1"/>
