  <text x="340" y="446" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Per-user / month</text>

  <rect x="440" y="380" width="160" height="70" rx="6" fill="#162545" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="520" y="402" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#0ea5e9" text-anchor="middle">TIER 3 — ADVANCED</text>
  <text x="520" y="418" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">+ SIP Trunking</text>
  <text x="520" y="432" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">DID Numbers</text>
  <text x="520" y="446" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Per-user / month</text>

  <rect x="620" y="380" width="200" height="70" rx="6" fill="#162545" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="720" y="402" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#34d399" text-anchor="middle">TIER 4 — ENTERPRISE</text>
  <text x="720" y="418" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Full Managed Service</text>
  <text x="720" y="432" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Dedicated Support</text>
  <text x="720" y="446" font-family="Arial,sans-serif" font-size="9" fill="#7a8fa8" text-anchor="middle">Custom SLA</text>
